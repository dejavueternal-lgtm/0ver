<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Доповідь по застосуванню</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #0b1323;
  color: #fff;
  padding: 20px;
}

h2 {
  border-bottom: 1px solid #2b3650;
  padding-bottom: 8px;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 5px;
  font-size: 15px;
}

input,
select,
textarea,
button {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  box-sizing: border-box;
  border-radius: 6px;
  border: 1px solid #3b4867;
  background: #f2f2f2;
  font-size: 15px;
}

textarea {
  min-height: 100px;
  resize: vertical;
}

button {
  background: #2b6de0;
  color: white;
  cursor: pointer;
  border: none;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  background: #1d57ba;
}

.remove-btn {
  background: #c62828;
}

.remove-btn:hover {
  background: #8f1b1b;
}

.add-btn {
  margin-top: 15px;
}

.entry {
  border: 1px solid #2b3650;
  background: #111c33;
  padding: 20px;
  margin-bottom: 25px;
  border-radius: 10px;
}

.row {
  display: flex;
  gap: 15px;
  margin-bottom: 10px;
}

.row > div {
  flex: 1;
}

.output {
  white-space: pre-wrap;
  background: #111827;
  padding: 15px;
  border: 1px solid #2b3650;
  margin-top: 20px;
  border-radius: 8px;
}

.success {
  margin-top: 15px;
  color: #4cff7b;
  font-weight: bold;
}

@media (max-width: 700px) {
  .row {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<h2>Застосування</h2>

<label>Дата</label>
<input id="date" type="date">

<label>Підрозділ</label>
<select id="unit"></select>

<label>Позивний</label>
<select id="callsign"></select>

<label>Н.П.</label>
<input id="settlement" type="text">

<label>Область</label>
<select id="region"></select>

<label>Час взльоту</label>
<input id="takeoff" type="time">

<label>Час посадки</label>
<input id="landing" type="time">

<label>БПЛА</label>
<select id="drone"></select>

<label>Ціль</label>
<input id="target" type="text">

<label>Висота</label>
<input id="height" type="text">

<label>Результат</label>
<select id="resultMain"></select>

<label>Уточнення</label>
<select id="resultExtra"></select>

<h2>Додаткові результати</h2>

<div id="entries"></div>

<button class="add-btn" type="button" onclick="addEntry()">
  + Додати запис
</button>

<br><br>

<button onclick="generate()">
  Згенерувати звіт та скопіювати
</button>

<div class="success" id="success"></div>

<h3>Результат:</h3>

<div class="output" id="output"></div>

<script>

// ===== СПИСКИ =====

const units = [
  "438 одн БпС ППО"
];

const callsigns = [
  "Вампір",
  "Вій",
  "Вовкулака",
  "Хмарники",
  "Лизун",
  "Химера",
  "Мольфар",
  "Знахар",
  "Змій",
  "Чупакабра",
  "Чугайстер",
  "Мавка",
  "Домовик"
];

const regions = [
  "Київська",
  "Харківська",
  "Дніпропетровська",
  "Полтавська",
  "Чернігівська",
  "Черкаська",
  "Кіровоградська"
];

const drones = [
  "P1-SUN",
  "STING",
  "AS3-IR Merops",
  "LITAVR F7",
  "Interceptor"
];

const resultMain = [
  "ціль уражена",
  "ціль знищена",
  "ціль не виявлено"
];

const resultExtra = [
  "втрата керування",
  "втрата управління",
  "борт повернуто",
  "підірвано в повітрі",
  "успішно"
];

// ===== Заповнення select =====

function fillSelect(id, data) {

  const el = document.getElementById(id);

  el.innerHTML = "";

  data.forEach(v => {

    const opt = document.createElement("option");

    opt.value = v;
    opt.textContent = v;

    el.appendChild(opt);
  });
}

fillSelect("unit", units);
fillSelect("callsign", callsigns);
fillSelect("region", regions);
fillSelect("drone", drones);
fillSelect("resultMain", resultMain);
fillSelect("resultExtra", resultExtra);

// ===== Утиліта =====

function val(id) {
  return document.getElementById(id).value || "";
}

// ===== Додавання запису =====

let entryIndex = 0;

function addEntry() {

  const container = document.getElementById("entries");

  const div = document.createElement("div");

  div.className = "entry";

  div.innerHTML = `

    <h3>Запис #${entryIndex + 1}</h3>

    <div class="row">

      <div>
        <label>Азимут на ціль</label>
        <input type="text" class="azimuth">
      </div>

      <div>
        <label>Дальність до цілі</label>
        <input type="text" class="distance">
      </div>

      <div>
        <label>Висота цілі</label>
        <input type="text" class="targetHeight">
      </div>

    </div>

    <label>Коментар:</label>

    <textarea class="comment" placeholder="Додаткові відомості..."></textarea>

    <button
      type="button"
      class="remove-btn"
      onclick="this.parentElement.remove()"
    >
      Видалити
    </button>

  `;

  container.appendChild(div);

  entryIndex++;
}

// ===== Генерація =====

async function generate() {

  let text =
`Дата: ${val("date")}
Підрозділ: ${val("unit")}
Позивний: ${val("callsign")}
Н.П.: ${val("settlement")}
Область: ${val("region")}
Час взльоту: ${val("takeoff")}
Час посадки: ${val("landing")}
БПЛА: ${val("drone")}
Ціль: ${val("target")}
Висота: ${val("height")}
Результат: ${val("resultMain")}
Уточнення: ${val("resultExtra")}
`;

  const entries = document.querySelectorAll(".entry");

  entries.forEach((e) => {

    text += `

Азимут на ціль:
${e.querySelector(".azimuth").value}

Дальність до цілі:
${e.querySelector(".distance").value}

Висота цілі:
${e.querySelector(".targetHeight").value}

Коментар:
${e.querySelector(".comment").value}

`;
  });

  // Вивід на екран
  document.getElementById("output").innerText = text;

  // Копіювання у буфер обміну
  try {

    await navigator.clipboard.writeText(text);

    document.getElementById("success").innerText =
      "Звіт скопійовано у буфер обміну";

  } catch (err) {

    document.getElementById("success").innerText =
      "Не вдалося скопіювати звіт";
  }
}

</script>

</body>
</html>
